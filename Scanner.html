<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>클래식 놀이터 체크인</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    margin: 0;
    background: #FBF5E9;
    color: #3a2e1f;
    text-align: center;
    padding: 16px;
  }
  h2 { color: #1f6f5c; margin: 8px 0 16px; }
  #reader {
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    border-radius: 12px;
    overflow: hidden;
    border: 3px solid #C9A24B;
  }
  #reader.hidden { display: none; }
  .stats {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 16px 0;
  }
  .stat-box {
    background: #fff;
    border: 2px solid #C9A24B;
    border-radius: 12px;
    padding: 12px 20px;
    min-width: 100px;
  }
  .stat-box .num { font-size: 28px; font-weight: bold; color: #1f6f5c; }
  .stat-box .label { font-size: 13px; color: #8a6d00; margin-top: 4px; }
  .result {
    margin-top: 16px;
    padding: 16px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    min-height: 28px;
  }
  .idle { background: #f0ece0; color: #8a7a5a; }
  .checking { background: #eef1f5; color: #4a5a6a; }
  .already { background: #fff3cd; color: #8a6d00; border: 2px solid #C9A24B; }
  .notfound { background: #fde2e2; color: #a02828; border: 2px solid #a02828; }
  .success { background: #e3f6e8; color: #1f6f5c; border: 2px solid #1f6f5c; }

  /* 확인 카드 */
  .confirm-card {
    margin-top: 16px;
    background: #fff;
    border: 3px solid #1f6f5c;
    border-radius: 16px;
    padding: 20px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }
  .confirm-card .name {
    font-size: 24px;
    font-weight: bold;
    color: #1f6f5c;
    margin-bottom: 4px;
  }
  .confirm-card .code {
    font-size: 13px;
    color: #8a7a5a;
    margin-bottom: 16px;
  }
  .count-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .count-row label { font-size: 15px; color: #3a2e1f; }
  .count-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #C9A24B;
    background: #fff;
    font-size: 20px;
    font-weight: bold;
    color: #1f6f5c;
  }
  .count-input {
    width: 60px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    padding: 8px;
    border: 2px solid #C9A24B;
    border-radius: 8px;
  }
  .btn-row {
    display: flex;
    gap: 10px;
  }
  .btn-confirm, .btn-cancel {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 17px;
    font-weight: bold;
  }
  .btn-confirm { background: #1f6f5c; color: #fff; }
  .btn-cancel { background: #eee; color: #555; }

  .manual {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }
  .manual input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 2px solid #C9A24B;
    font-size: 16px;
  }
  .manual button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: #1f6f5c;
    color: #fff;
    font-weight: bold;
  }
</style>
</head>
<body>
  <h2>🎻 클래식 놀이터 체크인</h2>

  <div class="stats">
    <div class="stat-box">
      <div class="num" id="checkedIn">-</div>
      <div class="label">입장 인원</div>
    </div>
    <div class="stat-box">
      <div class="num" id="totalReserved">-</div>
      <div class="label">전체 예매 인원</div>
    </div>
  </div>

  <div id="reader"></div>
  <div id="result" class="result idle">QR코드를 카메라에 비춰주세요</div>

  <!-- 조회 후 확인 카드 (평소엔 숨김) -->
  <div id="confirmCard" class="confirm-card" style="display:none;">
    <div class="name" id="confirmName"></div>
    <div class="code" id="confirmCode"></div>
    <div class="count-row">
      <label>관람 인원</label>
      <button class="count-btn" onclick="adjustCount(-1)">−</button>
      <input type="number" id="confirmCount" class="count-input" min="0" value="1">
      <button class="count-btn" onclick="adjustCount(1)">＋</button>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="cancelConfirm()">취소</button>
      <button class="btn-confirm" onclick="finalizeCheckIn()">입장 확정</button>
    </div>
  </div>

  <div class="manual">
    <input type="text" id="manualCode" placeholder="예매코드 직접입력 (예: YJ-001)">
    <button onclick="manualLookup()">조회</button>
  </div>

  <script>
    // ▼ 본인 Apps Script 웹앱 URL ▼
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxrQaHHpeo-6UoyXt4zHZnK6sLUS43bq-axnH4iFVQjc7GSeWJaY5vfIEQBf3HQAzHK/exec';
    // ▲▲▲

    let currentCode = null;
    let scanningPaused = false;

    function setResult(className, text) {
      const el = document.getElementById('result');
      el.className = 'result ' + className;
      el.innerText = text;
    }

    function showConfirmCard(code, name, count) {
      currentCode = code;
      document.getElementById('confirmName').innerText = name;
      document.getElementById('confirmCode').innerText = code;
      document.getElementById('confirmCount').value = count;
      document.getElementById('confirmCard').style.display = 'block';
      setResult('idle', '인원수를 확인하고 입장을 확정해주세요');
      scanningPaused = true;
    }

    function hideConfirmCard() {
      document.getElementById('confirmCard').style.display = 'none';
      currentCode = null;
      scanningPaused = false;
    }

    function adjustCount(delta) {
      const input = document.getElementById('confirmCount');
      const next = Math.max(0, (parseInt(input.value) || 0) + delta);
      input.value = next;
    }

    function cancelConfirm() {
      hideConfirmCard();
      setResult('idle', 'QR코드를 카메라에 비춰주세요');
    }

    async function lookup(code) {
      setResult('checking', '조회 중...');
      try {
        const res = await fetch(APPS_SCRIPT_URL + '?action=lookup&code=' + encodeURIComponent(code));
        const data = await res.json();

        if (data.status === 'found') {
          showConfirmCard(code, data.name, data.count);
        } else if (data.status === 'already') {
          setResult('already', '⚠️ ' + data.name + '님 (' + data.actualCount + '명) 이미 입장 처리됨');
          refreshStats();
        } else if (data.status === 'notfound') {
          setResult('notfound', '❌ 등록되지 않은 예매코드입니다');
        } else {
          setResult('notfound', '오류: ' + (data.message || '알 수 없는 오류'));
        }
      } catch (err) {
        setResult('notfound', '서버와 통신할 수 없습니다. URL 설정을 확인해주세요.');
      }
    }

    async function finalizeCheckIn() {
      if (!currentCode) return;
      const count = document.getElementById('confirmCount').value;
      setResult('checking', '입장 처리 중...');

      try {
        const res = await fetch(
          APPS_SCRIPT_URL + '?action=confirm&code=' + encodeURIComponent(currentCode) + '&count=' + encodeURIComponent(count)
        );
        const data = await res.json();

        if (data.status === 'success') {
          setResult('success', '✅ ' + data.name + '님 / ' + data.actualCount + '명 입장 완료');
        } else if (data.status === 'already') {
          setResult('already', '⚠️ ' + data.name + '님 이미 입장 처리됨');
        } else {
          setResult('notfound', '오류가 발생했습니다');
        }
        refreshStats();
      } catch (err) {
        setResult('notfound', '서버와 통신할 수 없습니다.');
      }

      hideConfirmCard();
    }

    async function refreshStats() {
      try {
        const res = await fetch(APPS_SCRIPT_URL + '?action=stats');
        const data = await res.json();
        document.getElementById('checkedIn').innerText = data.totalCheckedIn;
        document.getElementById('totalReserved').innerText = data.totalReserved;
      } catch (err) {
        // 통계 갱신 실패는 조용히 무시
      }
    }

    function manualLookup() {
      const code = document.getElementById('manualCode').value.trim();
      if (!code) return;
      lookup(code);
      document.getElementById('manualCode').value = '';
    }

    let lastCode = '';
    let lastTime = 0;

    function onScanSuccess(decodedText) {
      if (scanningPaused) return; // 확인 카드 떠있는 동안은 추가 스캔 무시

      const now = Date.now();
      if (decodedText === lastCode && now - lastTime < 3000) return;
      lastCode = decodedText;
      lastTime = now;
      lookup(decodedText);
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      onScanSuccess
    ).catch(function() {
      setResult('notfound', '카메라를 시작할 수 없습니다. 아래 수동입력을 이용해주세요.');
    });

    refreshStats();
    setInterval(refreshStats, 5000);
  </script>
</body>
</html>
